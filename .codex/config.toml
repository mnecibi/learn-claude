# Codex CLI project config — learn-ai-coding course (lessons 3 + 4).
#
# Codex requires you to TRUST this project before its hooks fire. The first
# time you start Codex in this repo, run `/hooks` and approve the project
# hooks. Otherwise nothing here runs.
#
# The [hooks] sections mirror .claude/settings.json; the [mcp_servers.*]
# sections mirror .mcp.json. Subagents live separately under .codex/agents/.

# ============================================================
# Hooks (lesson 3)
# ============================================================

# --- PreToolUse: guard against pom.xml edits -------------------------------
[[hooks.PreToolUse]]
matcher = "Edit|Write|MultiEdit"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "jq -r '.tool_input.file_path // \"\"' | grep -q 'pom\\.xml$' && { echo 'pom.xml edits require human review — please confirm with the user before changing Maven config.' >&2; exit 2; } || exit 0"

# --- PostToolUse: auto-compile after a .java edit --------------------------
[[hooks.PostToolUse]]
matcher = "Edit|Write|MultiEdit"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "jq -r '.tool_input.file_path // \"\"' | grep -qE '\\.java$' && mvn -q compile 2>&1 | tail -20 || exit 0"

# --- Stop: run the full test suite when the assistant wraps up -------------
[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "mvn -q test 2>&1 | grep -E 'Tests run|BUILD' | tail -3"

# ============================================================
# MCP servers (lesson 4)
# ============================================================

# --- filesystem: STDIO MCP server scoped to ./src --------------------------
[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "./src"]

# --- actuator: stub HTTP MCP server for Spring Boot actuator ---------------
# In production, run an MCP HTTP server in front of Spring Boot Actuator so
# the assistant can call /actuator/health, /actuator/metrics,
# /actuator/loggers as tools. See
# https://github.com/modelcontextprotocol/servers for HTTP-server examples.
[mcp_servers.actuator]
url = "http://localhost:8080/actuator-mcp"
